var STORE_KEY = 'mde_preturi_materii_v1';
var DATA_VERSION = '2026-07-22';
var state = { tab:'detailed', data:null, sortKey:null, sortDir:1 };

var COLS = {
  detailed: [
    {k:'mat', label:'Material / Denumire', cls:'mat'},
    {k:'dim', label:'Dimensiuni (L×l×g)'},
    {k:'fmt', label:'Format'},
    {k:'pret', label:'Preț', cls:'price'},
    {k:'um', label:'U.M.'},
    {k:'moq', label:'MOQ'},
    {k:'furn', label:'Furnizor'},
    {k:'proj', label:'Proiect'},
    {k:'obs', label:'Observații'},
    {k:'data', label:'Data'}
  ],
  central: [
    {k:'mat', label:'Material / Denumire', cls:'mat'},
    {k:'cat', label:'Categorie'},
    {k:'pret', label:'Preț', cls:'price'},
    {k:'um', label:'U.M.'},
    {k:'fmt', label:'Format / Dimensiuni'},
    {k:'furn', label:'Furnizor'},
    {k:'proj', label:'Proiect / Context'}
  ]
};

function loadData(){
  try { var s = localStorage.getItem(STORE_KEY); if(s){ var o=JSON.parse(s); if(o && o._v===DATA_VERSION){ return o; } } } catch(e){}
  return JSON.parse(JSON.stringify(EMBEDDED));
}
function saveData(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state.data)); }catch(e){ toast('Nu am putut salva în browser (spațiu plin).','err'); } }

function dimText(r){
  var p=[]; if(r.lat&&r.lat!=='–'&&r.lat!=='') p.push(r.lat); if(r.lung&&r.lung!=='–'&&r.lung!=='') p.push(r.lung); if(r.gros&&r.gros!=='–'&&r.gros!=='') p.push(r.gros);
  return p.join(' × ');
}

function init(){
  state.data = loadData();
  buildSupplierFilter();
  buildCatFilter();
  updateMeta();
  render();
}

function buildSupplierFilter(){
  var set={}; ['detailed','central'].forEach(function(t){ (state.data[t]||[]).forEach(function(r){ if(r.furn&&r.furn.trim()) set[r.furn.trim()]=1; }); });
  var sel=document.getElementById('supplier'); sel.innerHTML='<option value="">Toți furnizorii</option>';
  Object.keys(set).sort().forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}
function buildCatFilter(){
  var set={}; (state.data.central||[]).forEach(function(r){ if(r.cat&&r.cat.trim()) set[r.cat.trim()]=1; });
  var sel=document.getElementById('catFilter'); sel.innerHTML='<option value="">Toate categoriile</option>';
  Object.keys(set).sort().forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}
function updateMeta(){
  var d=state.data._updated; document.getElementById('updateMeta').textContent = d ? ('Actualizat: '+d) : 'Date originale (Apr–Iun 2026)';
}

function switchTab(t){
  state.tab=t; state.sortKey=null;
  document.getElementById('tab-detailed').classList.toggle('active', t==='detailed');
  document.getElementById('tab-central').classList.toggle('active', t==='central');
  document.getElementById('catFilter').style.display = (t==='central')?'block':'none';
  render();
}

function loose(s){ return String(s==null?'':s).toLowerCase().replace(/[\s\-_.\/]/g,''); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function hl(s, q){ s=esc(s); if(!q) return s; try{ var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); return s.replace(re,'<mark>$1</mark>'); }catch(e){ return s; } }

function render(){
  var q=document.getElementById('search').value.trim().toLowerCase();
  var sup=document.getElementById('supplier').value;
  var cat=document.getElementById('catFilter').value;
  var rows=(state.data[state.tab]||[]).slice();

  rows=rows.filter(function(r){
    if(sup && (r.furn||'').trim()!==sup) return false;
    if(state.tab==='central' && cat && (r.cat||'').trim()!==cat) return false;
    if(!q) return true;
    var hay=Object.keys(r).map(function(k){return r[k];}).join(' ').toLowerCase();
    if(state.tab==='detailed') hay+=' '+dimText(r).toLowerCase();
    var hayLoose=loose(hay);
    return q.split(/\s+/).every(function(t){ return hay.indexOf(t)>=0 || hayLoose.indexOf(loose(t))>=0; });
  });

  if(state.sortKey){
    var k=state.sortKey, dir=state.sortDir;
    rows.sort(function(a,b){
      var va=(k==='dim')?dimText(a):(a[k]||''), vb=(k==='dim')?dimText(b):(b[k]||'');
      var na=parseFloat(String(va).replace(',','.')), nb=parseFloat(String(vb).replace(',','.'));
      if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*dir;
      return String(va).localeCompare(String(vb),'ro')*dir;
    });
  }

  var cols=COLS[state.tab];
  var thead=document.getElementById('thead');
  thead.innerHTML='<tr>'+cols.map(function(c){ var arr=state.sortKey===c.k?(state.sortDir>0?' ▲':' ▼'):''; return '<th onclick="sortBy(\''+c.k+'\')">'+esc(c.label)+arr+'</th>'; }).join('')+'</tr>';

  var tbody=document.getElementById('tbody');
  if(!rows.length){ tbody.innerHTML='<tr><td colspan="'+cols.length+'" class="empty">Niciun rezultat. Încearcă alt termen.</td></tr>'; }
  else {
    tbody.innerHTML=rows.map(function(r){
      return '<tr>'+cols.map(function(c){
        var val = (c.k==='dim') ? dimText(r) : (r[c.k]||'');
        if(c.k==='um') return '<td class="um">'+esc(val)+'</td>';
        if(c.k==='cat') return '<td>'+(val?'<span class="cat-tag">'+esc(val)+'</span>':'')+'</td>';
        if(c.k==='furn') return '<td>'+(val?'<span class="badge">'+esc(val)+'</span>':'')+'</td>';
        if(c.cls) return '<td class="'+c.cls+'">'+hl(val,q)+'</td>';
        return '<td>'+hl(val,q)+'</td>';
      }).join('')+'</tr>';
    }).join('');
  }
  document.getElementById('count').textContent = rows.length+' din '+(state.data[state.tab]||[]).length+' înregistrări';
}

function sortBy(k){ if(state.sortKey===k){ state.sortDir*=-1; } else { state.sortKey=k; state.sortDir=1; } render(); }

function norm(s){ return String(s==null?'':s).trim(); }

function importExcel(ev){
  var f=ev.target.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var det=parseDetailed(wb), cen=parseCentral(wb);
      if(!det.length && !cen.length){ toast('Nu am găsit date recunoscute în fișier. Verifică structura.','err'); ev.target.value=''; return; }
      var nd={detailed: det.length?det:state.data.detailed, central: cen.length?cen:state.data.central};
      nd._updated=new Date().toLocaleDateString('ro-RO'); nd._v=DATA_VERSION;
      state.data=nd; saveData(); buildSupplierFilter(); buildCatFilter(); updateMeta(); render();
      toast('Import reușit: '+det.length+' prețuri, '+cen.length+' centralizate.','ok');
    }catch(err){ toast('Eroare la citirea fișierului: '+err.message,'err'); }
    ev.target.value='';
  };
  rd.readAsArrayBuffer(f);
}

function findSheet(wb, names){
  for(var i=0;i<names.length;i++){ if(wb.SheetNames.indexOf(names[i])>=0) return wb.Sheets[names[i]]; }
  return null;
}
function sheetRows(ws){ return XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); }
function headerIdx(rows){ for(var i=0;i<Math.min(rows.length,8);i++){ var line=rows[i].map(norm).join('|').toLowerCase(); if(line.indexOf('material')>=0) return i; } return 1; }

function parseDetailed(wb){
  var ws=findSheet(wb,['Prețuri Materii Prime','Preturi Materii Prime']) || wb.Sheets[wb.SheetNames[0]];
  if(!ws) return [];
  var rows=sheetRows(ws); var h=headerIdx(rows); var out=[];
  for(var i=h+1;i<rows.length;i++){ var r=rows[i]; if(r.every(function(c){return norm(c)==='';})) continue;
    var mat=norm(r[1]); if(!mat) continue;
    out.push({data:norm(r[0]),mat:mat,lat:norm(r[2]),lung:norm(r[3]),gros:norm(r[4]),fmt:norm(r[5]),pret:norm(r[6]),um:norm(r[7]),moq:norm(r[8]),furn:norm(r[9]),proj:norm(r[10]),obs:norm(r[11])});
  }
  return out;
}
function parseCentral(wb){
  var ws=findSheet(wb,['Centralizat pe Material']); if(!ws) return [];
  var rows=sheetRows(ws); var h=headerIdx(rows); var out=[]; var cat='';
  for(var i=h+1;i<rows.length;i++){ var r=rows[i]; var first=norm(r[0]);
    if(r.every(function(c){return norm(c)==='';})) continue;
    if(first.charAt(0)==='▸'){ cat=first.replace(/▸/g,'').trim(); continue; }
    if(!first) continue;
    out.push({cat:cat,mat:first,pret:norm(r[1]),um:norm(r[2]),fmt:norm(r[3]),furn:norm(r[4]),proj:norm(r[5])});
  }
  return out;
}

function exportExcel(){
  var wb=XLSX.utils.book_new();
  var d1=[['Data Email','Material / Denumire','Lățime (mm)','Lungime (m)','Grosime (mm)','Format','Preț','U.M.','MOQ','Furnizor','Proiect Ref.','Observații']];
  (state.data.detailed||[]).forEach(function(r){ d1.push([r.data,r.mat,r.lat,r.lung,r.gros,r.fmt,r.pret,r.um,r.moq,r.furn,r.proj,r.obs]); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(d1), 'Prețuri Materii Prime');
  var d2=[['Material / Denumire','Preț','U.M.','Format / Dimensiuni','Furnizor','Proiect / Context']]; var lastCat='';
  (state.data.central||[]).forEach(function(r){ if(r.cat&&r.cat!==lastCat){ d2.push(['▸  '+r.cat,'','','','','']); lastCat=r.cat; } d2.push([r.mat,r.pret,r.um,r.fmt,r.furn,r.proj]); });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(d2), 'Centralizat pe Material');
  XLSX.writeFile(wb, 'MDE_Materii_Prime_Preturi_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function resetData(){
  if(!confirm('Revii la datele inițiale și ștergi importurile salvate în acest browser?')) return;
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}
  state.data=JSON.parse(JSON.stringify(EMBEDDED)); buildSupplierFilter(); buildCatFilter(); updateMeta(); render();
  toast('Datele inițiale au fost restaurate.','ok');
}

function goHub(){ try{ window.location.href='index.html'; }catch(e){} }

var toastT;
function toast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type?(' '+type):''); clearTimeout(toastT); toastT=setTimeout(function(){ t.className='toast'; },3500); }

init();
</script>
